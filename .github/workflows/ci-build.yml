name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall app launch_app.py

  build-macos:
    name: Build macOS DMG
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build DMG
        run: bash ./build/build_mac.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UofferPortable-macos
          path: |
            dist/UofferPortable.dmg
            dist/UofferPortable.app

  build-windows:
    name: Build Windows EXE
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build EXE
        shell: pwsh
        run: .\build\build_win.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UofferPortable-windows
          path: |
            dist/UofferPortable.exe
            dist/UofferPortable-win.zip
